          "name": "What is the JavaScript event loop?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The JavaScript event loop is the runtime mechanism that orchestrates execution between the call stack, Web APIs, microtask queue, and macrotask queue. It runs synchronous code, drains microtasks (Promise.then, queueMicrotask), then picks up one macrotask at a time. JS Visualizer animates this entire dance so you can see exactly what runs when."
          }
        },
        {
          "@type": "Question",
          "name": "How does JS Visualizer help me learn async/await?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "JS Visualizer steps through async functions and shows you when execution suspends, when the resulting Promise resolves, when the resume callback enters the microtask queue, and when the await expression continues. You see the difference between Promise.then chaining, queueMicrotask, and setTimeout in real time."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between microtasks and macrotasks in JavaScript?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Microtasks (Promise.then callbacks, queueMicrotask) run immediately after the current synchronous task finishes — the engine drains the entire microtask queue before any macrotask. Macrotasks (setTimeout, setInterval, I/O events) run one per event-loop tick. JS Visualizer separates the two queues visually so the ordering is unmistakable."
          }
        },
        {
          "@type": "Question",
          "name": "Is JS Visualizer free to use?",

        <h1 style="font-size:2rem; margin:0 0 .5rem; letter-spacing:0.02em;">JS Visualizer — JavaScript Event Loop &amp; Runtime Tutorial</h1>
        <p style="font-size:1.1rem; color:#57534e; margin:0 0 1.5rem;">See Code. Understand Memory.</p>

        <p>JS Visualizer is a <strong>free interactive JavaScript visualizer</strong> that simulates the JavaScript runtime in real time. Step through code line-by-line and watch the <strong>call stack</strong>, <strong>Web APIs</strong>, <strong>task queue</strong>, <strong>microtask queue</strong>, <strong>event loop</strong>, and a force-directed <strong>memory graph</strong> animate as your code executes.</p>

        <p>Built for developers learning <em>async/await, Promises, closures, generators, classes,</em> and the event loop, JS Visualizer turns abstract runtime behavior into something you can watch and reason about.</p>

        <h2 style="margin-top:2rem;">Features</h2>
        <ul>
          <li>Step-by-step JavaScript execution with breakpoints</li>
          <li>Live call stack and frame visualization</li>
          <li>Web APIs panel (timers, fetch, etc.) with progress tracking</li>
          <li>Task queue and microtask queue with proper draining order</li>
          <li>Animated event loop phase indicator</li>
          <li>Memory graph showing heap objects, closures, and references</li>
          <li>Twenty-plus built-in examples covering JS fundamentals through advanced patterns</li>
          <li>Light and dark themes</li>
        </ul>

        <h2 style="margin-top:2rem;">Topics Covered</h2>
        <p>Synchronous execution, call stack, Promises, microtasks, timers, event loop, async/await, advanced patterns, error handling, Web APIs, hoisting &amp; TDZ, scope &amp; closures, this binding, type coercion, Map &amp; Set, classes, operators, destructuring, built-ins, generators, inheritance, metaprogramming, binary data.</p>
